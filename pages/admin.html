<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="https://images.vexels.com/media/users/3/224166/isolated/preview/3df01541f7c3310be04550b27643cce6-logo-de-postre-de-chocolate.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-body">

    <header>
        <h1>📊 Panel de Pedidos</h1>
        <p>Gestiona todos tus pedidos en un solo lugar</p>
    </header>

    <main class="admin-main">
        <div class="admin-container">
            <!-- CONTADOR DE PEDIDOS -->
            <div id="contador-pedidos-container" style="margin-bottom: 20px;"></div>

            <!-- SECCIÓN DE TABLA -->
            <section class="admin-section">
                <h2>📋 Pedidos Realizados</h2>
                <div class="table-wrapper">
                    <table class="table-modern" id="tablaPedidos">
                        <thead>
                            <tr>
                                <th>🆔 ID</th>
                                <th>👤 Nombre</th>
                                <th>🏠 Dirección</th>
                                <th>🍰 Menú</th>
                                <th>📦 Cantidad</th>
                                <th>📱 Celular</th>
                                <th>📝 Mensaje</th>
                                <th>📸 Foto</th>
                                <th>⚡ Estado</th>
                                <th>⚙️ Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Aquí se llenarán los pedidos dinámicamente -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- SECCIÓN DE LÍMITE -->
            <section class="admin-section">
                <h3>⚙️ Configuración</h3>
                <div class="limit-box">
                    <p>Establece el límite máximo de pedidos simultáneos</p>
                    <div class="limit-form">
                        <input type="number" id="limite" class="input-limite" placeholder="Ej: 10">
                        <button onclick="guardarLimite()" class="btn-limite">Guardar límite</button>
                    </div>
                </div>
                
                <div class="limit-box" style="margin-top: 20px; border-color: #ef4444; background-color: #fef2f2;">
                    <p style="color: #991b1b; font-weight: 600;">⚠️ Zona de Peligro</p>
                    <button onclick="eliminarTodosPedidos()" class="btn-delete-all" style="width: 100%; margin-top: 10px;">🗑️ Eliminar TODOS los pedidos</button>
                </div>
            </section>

            <!-- BOTÓN SALIR -->
            <div class="button-group">
                <a href="../index.html">
                    <button class="btn-secondary" style="width: 100%;">← Volver al inicio</button>
                </a>
            </div>
        </div>

    </main>

    <script src="../Js/admin.js"></script>

    <script>
        // Supongamos que el backend devuelve los pedidos en formato JSON con base64 en la columna "imagen_casa"
        function cargarPedidos() {
            fetch("https://backend-ep0u.onrender.com/pedidos")
            .then(response => response.json())
            .then(data => {
                const tabla = document.querySelector("#tablaPedidos tbody");
                tabla.innerHTML = "";

                if (data.success && Array.isArray(data.pedidos) && data.pedidos.length > 0) {
                    data.pedidos.forEach(p => {
                        // Generar la imagen en base64
                        let imagenHtml = '<td>';
                        if (p.imagen_casa && p.imagen_casa !== '---') {
                            imagenHtml += `<img src="data:image/png;base64,${p.imagen_casa}" alt="Foto" style="width: 100px; height: auto;">`;
                        } else {
                            imagenHtml += '---';
                        }
                        imagenHtml += '</td>';

                        const fila = `
                            <tr>
                                <td>${p.id_pedido}</td>
                                <td>${p.nombre}</td>
                                <td>${p.direccion}</td>
                                <td>${p.menu}</td>
                                <td>${p.cantidad}</td>
                                <td>${p.numcelular || 'N/A'}</td>
                                <td>${p.descripcion_adicional || '---'}</td>
                                <td>
                                    ${p.imagen_casa 
                                        ? `<a href="data:image/*;base64,${p.imagen_casa}" target="_blank">📸 Ver imagen</a>` 
                                        : '---'}
                                </td>
                                <td>${p.estado}</td>
                                <td>
                                    <select onchange="cambiarEstado(${p.id_pedido}, this.value)">
                                        <option value="">Cambiar estado</option>
                                        <option value="Pendiente - Por pagar">Pendiente - Por pagar</option>
                                        <option value="Preparado - Por pagar">Preparado - Por pagar</option>
                                        <option value="Preparado - Pagado">Preparado - Pagado</option>
                                        <option value="Entregado">Entregado</option>
                                    </select>
                                    <button onclick="confirmarEliminar(${p.id_pedido})">🗑️</button>
                                </td>
                            </tr>
                        `;
                        tabla.innerHTML += fila;
                    });
                } else {
                    tabla.innerHTML = '<tr><td colspan="10">No hay pedidos</td></tr>';
                }
            })
            .catch(error => {
                console.error("Error cargando pedidos:", error);
            });
        }

        // Llamada inicial para cargar los pedidos
        cargarPedidos();
        setInterval(cargarPedidos, 3000); // Recargar cada 3 segundos para mantener los pedidos actualizados
    </script>

</body>
</html>
