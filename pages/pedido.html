<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer Pedido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <header>
        <h1>📦 Realizar Pedido</h1>
    </header>

    <main>
        <div class="form-container">
            <form id="pedidoForm" class="form-modern">
                <div class="form-group">
                    <label for="nombre">👤 Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre completo" required>
                </div>

                <div class="form-group">
                    <label for="direccion">🏠 Dirección</label>
                    <input type="text" id="direccion" placeholder="Calle, número y apartamento" required>
                </div>

                <div class="form-group">
                    <label for="menu">🍰 Número de menú</label>
                    <input type="number" id="menu" placeholder="Selecciona un número de menú" min="1" required>
                </div>

                <div class="form-group">
                    <label for="cantidad">📊 Cantidad</label>
                    <input type="number" id="cantidad" placeholder="¿Cuántas unidades?" min="1" required>
                </div>

                <button type="submit" class="btn-submit">Enviar Pedido</button>
            </form>

            <a href="../index.html" class="link-volver">
                <button class="btn-secondary" style="width: 100%;">← Volver al inicio</button>
            </a>

            <p id="mensaje" class="mensaje"></p>
        </div>

    </main>

    <script src="../Js/pedidos.js"></script>

</body>
</html>
