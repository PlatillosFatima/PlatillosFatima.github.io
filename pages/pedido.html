<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer Pedido</title>

    <link rel="icon" href="https://images.vexels.com/media/users/3/224166/isolated/preview/3df01541f7c3310be04550b27643cce6-logo-de-postre-de-chocolate.png" type="image/png">
    <link rel="stylesheet" href="../css/styles.css">

    <!-- 🔥 LEAFLET (GRATIS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<header>
    <h1>📦 Realizar Pedido</h1>
</header>

<main>
    <div class="form-container">
        <form id="pedidoForm" class="form-modern">

            <div class="form-group">
                <label>👤 Nombre</label>
                <input type="text" id="nombre" placeholder="Tu nombre completo" required>
            </div>

            <div class="form-group">
                <label>🏠 Dirección</label>
                <input type="text" id="direccion" placeholder="Calle, número y apartamento" required>

                <!-- 🔥 BOTÓN MAPA -->
                <button type="button" class="btn-secondary" onclick="abrirMapa()" style="margin-top:8px;">
                    📍 Seleccionar en el mapa
                </button>
            </div>

            <div class="form-group">
                <label>🍰 Número de menú</label>
                <input type="number" id="menu" min="1" required>
            </div>

            <div class="form-group">
                <label>📊 Cantidad</label>
                <input type="number" id="cantidad" min="1" required>
            </div>

            <div class="form-group">
                <label>📱 Número de celular</label>
                <input type="tel" id="numcelular" required>
            </div>

            <div class="form-group">
                <label>📝 Mensaje adicional</label>
                <textarea id="descripcion_adicional"></textarea>
            </div>

            <div class="form-group">
                <label>📸 Foto</label>
                <input type="file" id="imagen_casa" accept="image/*">
            </div>

            <button type="submit" class="btn-submit">Enviar Pedido</button>

        </form>

        <a href="../index.html" class="link-volver">
            <button class="btn-secondary" style="width:100%;">← Volver</button>
        </a>

        <p id="mensaje" class="mensaje"></p>
    </div>
</main>

<!-- 🔥 MODAL MAPA -->
<div id="modalMapa" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:9999;
">

    <div style="
        width:90%;
        max-width:600px;
        height:80%;
        background:white;
        border-radius:15px;
        overflow:hidden;
        display:flex;
        flex-direction:column;
    ">

        <div id="map" style="flex:1;"></div>

        <div style="padding:10px; display:flex; gap:10px;">
            <button class="btn-submit" style="flex:1;" onclick="confirmarUbicacion()">
                Confirmar ubicación
            </button>

            <button class="btn-secondary" style="flex:1;" onclick="cerrarMapa()">
                Cancelar
            </button>
        </div>

    </div>
</div>

<!-- 🔥 JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="../Js/pedidos.js"></script>

</body>
</html>
