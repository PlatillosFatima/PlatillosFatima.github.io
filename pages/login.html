<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <header>
        <h1>🔐 Iniciar Sesión</h1>
    </header>

    <main>
        <div class="form-container">
            <form id="loginForm" class="form-modern">
                <div class="form-group">
                    <label for="usuario">👤 Usuario</label>
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="form-group">
                    <label for="password">🔑 Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <a href="../index.html" class="link-volver">
                <button class="btn-secondary" style="width: 100%;">← Volver al inicio</button>
            </a>

            <p id="mensaje" class="mensaje"></p>
        </div>

    </main>

    <script src="../js/auth.js"></script>

</body>
</html>
